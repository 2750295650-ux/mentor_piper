defaults:
  - _self_
  - task@_global_: cartpole_swingup_sparse
  - agent@_global_: mentor
  - override hydra/launcher: submitit_local

# task settings
frame_stack: 3
action_repeat: 2
discount: 0.99
# train settings
num_seed_frames: 4000
update_every_steps: 2
# eval
eval_every_frames: 10000
num_eval_episodes: 10
# snapshot
save_snapshot: True
save_interval: 10000
snapshot_path: /home/zhixing/mentor/exp_local/2026.03.01/135118_agent=mentor_mw,task=coffee-push/snapshots/snapshot_50250.pt
load_from_id: false
load_id: 250
eval_only: false
# wandb
use_wandb: false
# replay buffer
replay_buffer_size: 1000000
replay_buffer_num_workers: 8
nstep: 3
batch_size: 512
# misc
seed: 0
device: cuda:1
save_video: true
save_train_video: false
use_tb: true
# experiment
experiment: exp
# agent
lr: 1e-4
feature_dim: 50

hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${hydra.job.override_dirname}
  sweep:
    dir: ./exp/${now:%Y.%m.%d}/${now:%H%M}_${agent_cfg.experiment}
    subdir: ${hydra.job.num}
  launcher:
    timeout_min: 4300
    cpus_per_task: 10
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: 160
    nodes: 1
    submitit_folder: ./exp/${now:%Y.%m.%d}/${now:%H%M%S}_${agent_cfg.experiment}/.slurm
